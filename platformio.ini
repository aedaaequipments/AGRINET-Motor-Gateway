; AGRINET 3-Phase Motor Controller (Master Gateway)
; Platform: STM32F103C8T6 (Blue Pill)
; Framework: STM32Cube + FreeRTOS (CMSIS-RTOS v2)

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; Upload via ST-Link V2
upload_protocol = stlink
debug_tool = stlink
; Build flags
build_flags =
    -D STM32F103xB
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000U
    ; FreeRTOS config
    -D configUSE_PREEMPTION=1
    -D configUSE_IDLE_HOOK=0
    -D configUSE_TICK_HOOK=0
    -D configCPU_CLOCK_HZ=72000000
    -D configTICK_RATE_HZ=1000
    -D configMAX_PRIORITIES=5
    -D configMINIMAL_STACK_SIZE=128
    -D configTOTAL_HEAP_SIZE=0
    -D configSUPPORT_STATIC_ALLOCATION=1
    -D configSUPPORT_DYNAMIC_ALLOCATION=0
    -D configMAX_TASK_NAME_LEN=12
    -D configUSE_MUTEXES=1
    -D configUSE_COUNTING_SEMAPHORES=1
    -D configQUEUE_REGISTRY_SIZE=8
    -D configUSE_TIMERS=1
    -D configTIMER_TASK_PRIORITY=2
    -D configTIMER_QUEUE_LENGTH=10
    -D configTIMER_TASK_STACK_DEPTH=256
    -D configCHECK_FOR_STACK_OVERFLOW=2
    ; AGRINET features
    -D AGRINET_MASTER
    -D FW_VERSION_MAJOR=1
    -D FW_VERSION_MINOR=0
    -D FW_VERSION_PATCH=0
    -I src
    ; FreeRTOS include paths (symlinked in lib/FreeRTOS/)
    -I lib/FreeRTOS/include
    -I lib/FreeRTOS

; Monitor
monitor_port = /dev/cu.usbserial-14240
monitor_speed = 9600

; Increase max flash usage check
board_build.mcu = stm32f103c8t6
board_upload.maximum_size = 65536
board_upload.maximum_ram_size = 20480

; ──────────────────────────────────────────────────────────────
; SERIAL UPLOAD (for when ST-Link fails or RST not wired)
; Usage:
;   1. Set BOOT0 jumper = 1 (3.3V)
;   2. Connect USB-TTL: TX→PA10, RX→PA9, GND→GND
;   3. Press RESET button
;   4. Run: pio run -e serial_upload -t upload
;   5. After upload: set BOOT0 jumper back to 0 and press RESET
; ──────────────────────────────────────────────────────────────
[env:serial_upload]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
upload_protocol = serial
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*
monitor_speed = 9600
build_flags = ${env:bluepill_f103c8.build_flags}
board_build.mcu = stm32f103c8t6
board_upload.maximum_size = 65536
board_upload.maximum_ram_size = 20480
